<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台本ナビ</title>
<style>
  :root {
    --primary: #2563eb;
    --bg: #f8fafc;
    --text: #1e293b;
    --border: #e2e8f0;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: var(--bg);
    color: var(--text);
    line-height: 1.6;
    margin: 0;
    padding: 20px;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  }
  h1 { font-size: 1.5rem; text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-weight: bold; margin-bottom: 5px; }
  input[type="text"], input[type="file"], input[type="password"] {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    box-sizing: border-box;
  }
  button {
    background-color: var(--primary);
    color: white;
    border: none;
    padding: 12px 20px;
    font-size: 1rem;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    font-weight: bold;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { background-color: #94a3b8; cursor: not-allowed; }
  
  .tabs { display: flex; margin-top: 30px; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 10px 20px;
    cursor: pointer;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    background: #f1f5f9;
    margin-right: 5px;
  }
  .tab.active { background: white; border-color: var(--border); font-weight: bold; border-bottom: 1px solid white; margin-bottom: -1px; }
  .tab-content { display: none; padding: 20px; border: 1px solid var(--border); border-top: none; background: white; min-height: 300px; }
  .tab-content.active { display: block; }

  .output-area { white-space: pre-wrap; }
  .output-area h3 { color: var(--primary); border-bottom: 1px dashed var(--primary); padding-bottom: 5px; margin-top: 25px; }
  .output-area strong { background: linear-gradient(transparent 60%, #fef08a 60%); padding: 0 2px; }
  .output-area blockquote { border-left: 4px solid var(--primary); background: #f0fdf4; padding: 10px; margin: 0; border-radius: 4px; }
  .output-area ul { padding-left: 20px; margin: 10px 0; }
  .output-area li { margin-bottom: 6px; }

  table { width: 100%; border-collapse: collapse; margin: 15px 0; }
  th, td { border: 1px solid var(--border); padding: 8px; text-align: left; }
  th { background-color: #f8fafc; }

  .placeholder { text-align: center; color: #94a3b8; padding: 50px 20px; }
  .placeholder-icon { font-size: 3rem; margin-bottom: 10px; display: block; }

  /* Q&Aチャット枠を550pxに拡張して見やすく改善 */
  .chat-box { height: 550px; overflow-y: auto; border: 1px solid var(--border); padding: 15px; border-radius: 6px; margin-bottom: 15px; background: #fafafa; }
  .message { margin-bottom: 15px; padding: 10px; border-radius: 8px; max-width: 85%; }
  .msg-user { background: var(--primary); color: white; margin-left: auto; border-bottom-right-radius: 0; }
  .msg-ai { background: white; border: 1px solid var(--border); margin-right: auto; border-bottom-left-radius: 0; }
  .msg-ai ul { padding-left: 20px; margin: 8px 0; }
  .msg-ai li { margin-bottom: 4px; }
  
  .suggest-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
  .chip { background: #e0e7ff; color: var(--primary); border: 1px solid #c7d2fe; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; font-weight: normal; width: auto; }
  .chip:hover { background: #c7d2fe; }

  .qa-input-area { display: flex; gap: 10px; }
  .qa-input-area input { flex: 1; }
  .qa-input-area button { width: auto; }
  
  .hidden { display: none !important; }
  .footer { text-align: center; margin-top: 30px; font-size: 0.8rem; color: #64748b; }
</style>
</head>
<body>

<div class="container" id="api-setup-screen">
  <h1>⚙️ 初期設定</h1>
  <div class="form-group">
    <label>共通APIキーを入力してください</label>
    <input type="password" id="api-key" placeholder="AIzaSy...">
    <p style="font-size:0.8rem; color:#64748b;">※キーはブラウザにのみ保存され、外部には送信されません。</p>
  </div>
  <button onclick="saveApiKey()">保存して利用開始</button>
</div>

<div class="container hidden" id="main-app-screen">
  <h1>台本ナビ</h1>
  
  <div class="form-group">
    <label>1. 台本データ（CSV）を選択</label>
    <input type="file" id="csv-file" accept=".csv">
  </div>
  
  <div class="form-group">
    <label>2. 架電先のリスト名</label>
    <input type="text" id="target-list" placeholder="例: 商業施設設計＠関東 など">
  </div>
  
  <button id="generate-btn" onclick="generateScript()">解説シートを作成する</button>
  <div id="loading" style="display:none; text-align:center; margin-top:15px;">⏳ AIが情報を分析・補完中...</div>

  <div class="tabs" id="result-tabs">
    <div class="tab active" onclick="switchTab('sheet')">📄 解説シート</div>
    <div class="tab" onclick="switchTab('qa')">❓ ナビへのQ&A</div>
  </div>

  <div id="tab-sheet" class="tab-content active">
    <div id="placeholder-sheet" class="placeholder">
      <span class="placeholder-icon">📋</span>
      CSVとリスト名を入力して用紙を作成すると、<br>ここに解説シートが表示されます。
    </div>
    <div id="output-sheet" class="output-area hidden"></div>
  </div>

  <div id="tab-qa" class="tab-content">
    <div class="suggest-chips">
      <button class="chip" onclick="sendSuggest('もっと噛み砕いて言うと？')">もっと噛み砕いて言うと？</button>
      <button class="chip" onclick="sendSuggest('具体的な使用シーンは？')">使用シーンは？</button>
      <button class="chip" onclick="sendSuggest('出てくる専門用語を分かりやすくして')">専門用語を分かりやすくして</button>
    </div>
    <div class="chat-box" id="chat-history">
      <div class="message msg-ai">商材についての質問にお答えします。解説シート作成後にご質問ください。</div>
    </div>
    <div class="qa-input-area">
      <input type="text" id="qa-input" placeholder="商材についてナビに質問する...">
      <button onclick="askQuestion()">送信</button>
    </div>
  </div>

  <div class="footer">台本ナビ © 2026 Training Director Assistant</div>
</div>

<script>
  let currentCsvData = "";
  let chatContext = [];

  window.onload = function() {
    const savedKey = localStorage.getItem('gemini_api_key');
    if (savedKey) {
      document.getElementById('api-setup-screen').classList.add('hidden');
      document.getElementById('main-app-screen').classList.remove('hidden');
    }
  };

  function saveApiKey() {
    const key = document.getElementById('api-key').value.trim();
    if (!key) {
      alert("APIキーを入力してください。");
      return;
    }
    localStorage.setItem('gemini_api_key', key);
    document.getElementById('api-setup-screen').classList.add('hidden');
    document.getElementById('main-app-screen').classList.remove('hidden');
  }

  function getApiKey() {
    const key = localStorage.getItem('gemini_api_key');
    if (!key) {
      alert("APIキーが設定されていません。画面をリロードして設定してください。");
    }
    return key;
  }

  document.getElementById('csv-file').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      currentCsvData = e.target.result;
    };
    reader.readAsText(file);
  });

  function switchTab(tabId) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    
    event.target.classList.add('active');
    document.getElementById('tab-' + tabId).classList.add('active');
  }

  function parseMarkdown(text) {
    let html = text;
    // 見出しと太字の変換
    html = html.replace(/### (.*?)\n/g, '<h3>$1</h3>\n');
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');
    html = html.replace(/> (.*?)\n/g, '<blockquote>$1</blockquote>\n');
    
    // アスタリスク混じりの箇条書き行を綺麗にリスト化
    let lines = html.split('\n');
    let inList = false;
    let processedLines = [];
    
    for (let i = 0; i < lines.length; i++) {
      let line = lines[i].trim();
      if (line.startsWith('* ') || line.startsWith('- ')) {
        if (!inList) {
          processedLines.push('<ul>');
          inList = true;
        }
        let content = line.substring(2);
        processedLines.push('<li>' + content + '</li>');
      } else {
        if (inList) {
          processedLines.push('</ul>');
          inList = false;
        }
        processedLines.push(lines[i]);
      }
    }
    if (inList) {
      processedLines.push('</ul>');
    }
    
    return processedLines.join('<br>');
  }

  async function generateScript() {
    if (!currentCsvData) {
      alert("CSVファイルを選択してください。");
      return;
    }
    const target = document.getElementById('target-list').value;
    if (!target) {
      alert("ターゲット属性を入力してください。");
      return;
    }

    const apiKey = getApiKey();
    if (!apiKey) return;

    document.getElementById('generate-btn').disabled = true;
    document.getElementById('loading').style.display = 'block';
    document.getElementById('placeholder-sheet').classList.add('hidden');
    document.getElementById('output-sheet').classList.add('hidden');
    
    const prompt = `
# 役割と目的
あなたは優秀なテレアポのディレクター（SV）「台本ナビ」です。提供された「会社名・商材情報が記載されたCSVファイル」と、架電先のリスト名を分析し、架電者が商材の本質を即座に理解して自信を持って案内できる「噛み砕いた解説＆切り返しトーク」を出力構成通りに作成してください。架電者はその業界に詳しくない主婦が多いのでその点を踏まえて対応してください。

指示 (Instructions)
以下のステップに従って、架電者が商材の本質を深く理解し、自信を持って案内できるようになるための「かんたん解説シート」を作成してください。

1. CSVからの情報抽出: 主要な情報を抽出・把握してください。
2. 企業情報のウェブ検索補完: 公式情報や信頼できるソースから最新の事業内容や商材の特徴を収集し、CSVの情報を補完してください。※必ず「検索キーワード」を用いて情報を集めてください。
3. 資料の生成: 以下の【出力構成】に従って出力してください。

■ 追加の厳守ルール
・アポイント時間の打診を行う際は、必ず「最低でも20分（例: 20分ほど）」で案内してください。「10分〜15分」などの提案は一切禁止です。
・文字の強調にはダブルアスタリスク（**強調したい文字**）を使用してください。
・前置きの挨拶や「作成しました」などの文章は一切不要です。いきなり「1. 💡 何を勧める？メリットは？」から出力を開始してください。
・太字（**）は1文につき「最も重要な単語やフレーズ1〜2箇所」のみに限定してください。
・文章全体・1文まるごと・箇条書きの行全体を太字にすることは禁止です。
・太字にしてよいのは「数字」「固有名詞」「決め台詞となるキーワード」のみです。
　（悪い例）**この商材は中小企業の経理業務を自動化し、月次決算を大幅に短縮するサービスです**
　（良い例）この商材は**経理業務を自動化**し、月次決算を**大幅に短縮**するサービスです

出力構成

### 1. 💡 何を勧める？メリットは？
【文字数目安：250文字以内】
短くシンプルに解説。架電者が商材の仕組みや顧客が抱えているであろう一般的な課題点と解決策及びメリットを直感的に理解できるよう、絵文字と記号を使ったシンプルな関係図、またはMarkdownのテーブル機能で商材の構造を視覚的に表現。

### 2.⏰ なぜ「今」？
【文字数目安：250文字以内】
損失回避バイアスを用い「後回しにすると損をするかも」「今聞いておかないとマズイかも」と緊急性を感じさせる理由を、端的に、1〜2文で提示してください。

### 3．🛡️切返し時に使える訴求ポイント
「興味ない」「間に合っている」「他社を使っている」などの拒否への対応を3パターン作成。
・【訴求ポイント】：同調しながらも損失回避バイアスを用い、現状維持のリスクをそれとなく提示しそれに対するメリットを提示。100字程度。

【インプットデータ】
ターゲットリスト属性: ${target}
CSV内容:
${currentCsvData}
    `;

    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          tools: [{ googleSearch: {} }]
        })
      });

      const data = await response.json();
      const resultText = data.candidates[0].content.parts[0].text;
      
      document.getElementById('output-sheet').innerHTML = parseMarkdown(resultText);
      document.getElementById('output-sheet').classList.remove('hidden');
      
      chatContext = [
        { role: "user", parts: [{ text: "以下の商材情報を把握してください。\n" + currentCsvData }] },
        { role: "model", parts: [{ text: "把握しました。質問にシンプルに答えます。" }] }
      ];
      
      document.getElementById('chat-history').innerHTML = '<div class="message msg-ai">商材情報の読み込みが完了しました。何でも質問してください。</div>';

    } catch (error) {
      alert("エラーが発生しました: " + error.message);
      document.getElementById('placeholder-sheet').classList.remove('hidden');
    } finally {
      document.getElementById('generate-btn').disabled = false;
      document.getElementById('loading').style.display = 'none';
    }
  }

  function sendSuggest(text) {
    document.getElementById('qa-input').value = text;
    askQuestion();
  }

  async function askQuestion() {
    const inputField = document.getElementById('qa-input');
    const question = inputField.value.trim();
    if (!question) return;

    if (!currentCsvData) {
      alert("先にCSVを読み込み、解説シートを作成してください。");
      return;
    }

    const apiKey = getApiKey();
    if (!apiKey) return;

    const chatBox = document.getElementById('chat-history');
    chatBox.innerHTML += `<div class="message msg-user">${question}</div>`;
    inputField.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;

    chatContext.push({ role: "user", parts: [{ text: question }] });

    const systemInstruction = "あなたはナビです。挨拶や前置きは一切不要。回答はダラダラ書かず、必ず箇条書き（* ）を使い、1文を短く（30文字以内）して、直感的に分かりやすく回答してください。・太字（**）は1文につき「最も重要な単語やフレーズ1〜2箇所」のみに限定してください。
・文章全体・1文まるごと・箇条書きの行全体を太字にすることは禁止です。
・太字にしてよいのは「数字」「固有名詞」「決め台詞となるキーワード」のみです。
　（悪い例）**この商材は中小企業の経理業務を自動化し、月次決算を大幅に短縮するサービスです**
　（良い例）この商材は**経理業務を自動化**し、月次決算を**大幅に短縮**するサービスです";

    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          systemInstruction: { parts: [{ text: systemInstruction }] },
          contents: chatContext,
          tools: [{ googleSearch: {} }]
        })
      });

      const data = await response.json();
      const answer = data.candidates[0].content.parts[0].text;

      chatContext.push({ role: "model", parts: [{ text: answer }] });
      chatBox.innerHTML += `<div class="message msg-ai">${parseMarkdown(answer)}</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {
      chatBox.innerHTML += `<div class="message msg-ai" style="color:red;">エラー: ${error.message}</div>`;
    }
  }
</script>
</body>
</html>
