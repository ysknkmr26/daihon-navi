<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台本ナビ</title>
  <!-- MarkdownをHTMLに変換するライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { 
      font-family: 'Helvetica Neue', Arial, sans-serif; 
      padding: 0;
      margin: 0;
      background-color: #ffffff; 
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .container { 
      max-width: 800px; 
      margin: 0 auto; 
      padding: 40px 20px; 
      flex: 1;
      width: 100%;
      box-sizing: border-box;
    }

    /* 画面上のタイトル */
    h2.app-title { 
      text-align: center; 
      color: #1a2b4c; 
      margin-bottom: 20px; 
      font-size: 24px;
      font-weight: bold;
    }
    
    .header-line {
      border-top: 2px solid #2563eb;
      margin-bottom: 30px;
    }

    /* 入力フォーム */
    .form-group { margin-bottom: 25px; }
    label { 
      display: block; 
      margin-bottom: 10px; 
      font-weight: bold; 
      color: #333; 
      font-size: 16px;
    }
    input[type="text"], input[type="file"], input[type="password"] { 
      width: 100%; 
      padding: 12px; 
      box-sizing: border-box; 
      border: 1px solid #e5e7eb; 
      border-radius: 4px; 
      font-size: 14px;
      color: #374151;
    }
    input[type="text"]::placeholder, input[type="password"]::placeholder {
      color: #9ca3af;
    }
    input[type="file"] {
      background-color: #f9fafb;
      cursor: pointer;
    }

    /* エラーメッセージ用 */
    .error-message {
      color: #dc2626;
      background-color: #fee2e2;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
      font-weight: bold;
    }

    /* セキュリティ設定エリア（GitHub共有用） */
    .settings-panel {
      background-color: #f8fafc;
      border: 1px dashed #cbd5e1;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 30px;
    }
    .settings-panel label {
      font-size: 14px;
      color: #475569;
      display: flex;
      justify-content: space-between;
    }
    .settings-panel label small {
      color: #ef4444;
      font-weight: normal;
    }

    /* 青色の生成ボタン */
    button.main-btn { 
      width: 100%;
      padding: 16px 24px; 
      background-color: #2563eb; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      font-size: 16px; 
      font-weight: bold;
      cursor: pointer; 
      transition: background 0.2s;
      margin-bottom: 30px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    button.main-btn:hover { background-color: #1d4ed8; }
    button.main-btn:disabled { background-color: #93c5fd; cursor: not-allowed; }

    /* コンテンツエリア */
    .content-area {
      border: 1px solid #e5e7eb;
      padding: 40px;
      min-height: 300px;
      background-color: #ffffff;
      border-radius: 6px;
      position: relative;
    }

    /* 区切り線・チャットタイトル */
    .section-divider {
      border: 0;
      border-top: 2px dashed #e5e7eb;
      margin: 50px 0 30px 0;
    }
    .chat-title {
      font-size: 18px;
      color: #1f2937;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
    }

    /* 初期状態（プレースホルダー） */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #9ca3af;
      text-align: center;
      padding: 40px 0;
    }
    .empty-state svg { margin-bottom: 16px; opacity: 0.7; }
    
    #loading { display: none; text-align: center; color: #2563eb; font-weight: bold; padding: 40px 0; }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(37,99,235,0.3);
      border-radius: 50%;
      border-top-color: #2563eb;
      animation: spin 1s ease-in-out infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 生成された台本ナビのデザイン */
    .output-content h1 { 
      text-align: center; 
      color: #111; 
      font-size: 22px; 
      margin-bottom: 30px; 
    }
    .output-content h3 {
      background-color: #f8fafc;
      padding: 12px 15px;
      border-left: 6px solid #2563eb;
      margin-top: 35px;
      margin-bottom: 15px;
      font-size: 18px;
      color: #1e293b;
    }
    .output-content p { line-height: 1.8; font-size: 15px; margin-bottom: 15px; }
    .output-content table {
      width: 100%; border-collapse: collapse; margin: 20px 0;
      background-color: #ffffff;
    }
    .output-content th, .output-content td {
      border: 1px solid #e2e8f0; padding: 12px; text-align: left;
    }
    .output-content th { background-color: #f1f5f9; font-weight: bold; color: #334155; }
    .output-content hr { border: 0; border-top: 1px solid #e2e8f0; margin: 30px 0; }
    
    .tag-info { background-color: #e0f2fe; color: #0284c7; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.9em; margin-right: 5px;}
    .tag-title { background-color: #fef9c3; color: #a16207; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.9em; margin-right: 5px;}
    .tag-red { color: #ef4444; font-weight: bold; }

    /* Q&A チャット UI */
    #qa-content {
      display: flex;
      flex-direction: column;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 20px;
      margin-bottom: 20px;
      border-bottom: 1px solid #e5e7eb;
      max-height: 400px;
    }
    .message {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
    }
    .message.user { align-items: flex-end; }
    .message.bot { align-items: flex-start; }
    .message-bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
    }
    .message.user .message-bubble {
      background-color: #2563eb;
      color: white;
      border-bottom-right-radius: 0;
    }
    .message.bot .message-bubble {
      background-color: #f3f4f6;
      color: #1f2937;
      border-bottom-left-radius: 0;
    }
    /* チャット内のMarkdown対応 */
    .message.bot .message-bubble p { margin: 0 0 10px 0; }
    .message.bot .message-bubble p:last-child { margin: 0; }
    
    .chat-input-area { display: flex; gap: 10px; }
    .chat-input-area input { flex: 1; margin-bottom: 0; }
    .chat-input-area button { width: auto; margin-bottom: 0; padding: 12px 24px; }

    /* フッター */
    .footer {
      text-align: center;
      padding: 20px;
      color: #6b7280;
      font-size: 14px;
      border-top: 1px solid #e5e7eb;
      background-color: #ffffff;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="app-title">台本ナビ</h2>
    <div class="header-line"></div>
    
    <div id="errorMessage" class="error-message"></div>

    <!-- GitHub等で共有する際、ソースコードに直書きせずに画面から入力させる -->
    <div class="settings-panel">
      <label for="apiKeyInput">
        🔑 Gemini API キー
        <small>※ソースコード公開時は必須です。安全のためブラウザ上でのみ保持されます。</small>
      </label>
      <input type="password" id="apiKeyInput" placeholder="AI Studioで取得したAPIキーを入力してください (例: AIzaSy...)">
    </div>

    <div class="form-group">
      <label for="csvFile">1. 台本データ（CSV）を選択</label>
      <input type="file" id="csvFile" accept=".csv">
    </div>

    <div class="form-group">
      <label for="listName">2. 架電先のリスト名</label>
      <input type="text" id="listName" placeholder="例: 商業施設設計@関東 など">
    </div>
    
    <button onclick="processRequest()" id="submitBtn" class="main-btn">解説シートを作成する</button>
    
    <!-- コンテンツ表示エリア -->
    <div class="content-area">
      <div id="loading"><span class="spinner"></span>ウェブ検索を実行し、最新情報で台本を分析しています...（約10〜20秒）</div>
      
      <div id="empty-state" class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
          <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
          <path d="M9 14h6"></path>
          <path d="M9 18h6"></path>
          <path d="M9 10h.01"></path>
        </svg>
        <p>CSVとリスト名を入力して「作成」を押すと、<br>ここに解説シートが表示されます。</p>
      </div>

      <!-- 生成結果とQ&Aのコンテナ（1画面構成） -->
      <div id="result-container" style="display: none;">
        
        <!-- 解説シート -->
        <div id="output" class="output-content"></div>

        <!-- 区切り線 -->
        <hr class="section-divider">

        <!-- Q&Aエリア -->
        <h3 class="chat-title"><span style="color: #ef4444;">❓</span> ナビへのQ&A</h3>
        <div id="qa-content">
          <div class="chat-messages" id="chatMessages">
            <!-- メッセージはJSで動的に挿入されます -->
          </div>
          <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="台本のここが分からない、この言葉どういう意味？、〇〇と言われたらどう返す？等..." onkeypress="handleKeyPress(event)">
            <button onclick="sendQuestion()" class="main-btn" id="sendBtn">送信</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="footer">
    台本ナビ &copy; 2026 Training Director Assistant
  </div>

  <script>
    // Q&Aのコンテキストとして利用するため、生成された解説シートを保持
    let generatedScriptContent = "";
    let currentCsvData = "";

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      setTimeout(() => { errorDiv.style.display = 'none'; }, 5000);
    }

    // GASの代わりとなる、フロントエンドからの直接APIコール関数
    async function callGeminiAPI(systemPrompt, userPrompt) {
      // 画面からAPIキーを取得（空の場合はCanvas環境提供のキーが利用される仕組み）
      const userApiKey = document.getElementById('apiKeyInput').value.trim();
      const apiKey = userApiKey || ""; 
      
      // 注意: Gemini APIのモデル名は gemini-3.5-flash ではなく、提供されている最新のフラッシュモデルを指定します。
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;

      const payload = {
        contents: [{
          parts: [{ text: systemPrompt + "\n\n" + userPrompt }]
        }],
        // ★重要: ここがGASで失敗していた原因です。"googleSearch" ではなく "google_search" が正解です。
        tools: [{ "google_search": {} }] 
      };

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
           throw new Error(data.error?.message || `HTTP error! status: ${response.status}`);
        }

        if (data.candidates && data.candidates[0] && data.candidates[0].content) {
          return data.candidates[0].content.parts[0].text;
        } else {
          throw new Error('予期せぬレスポンス形式です。');
        }
      } catch (error) {
        console.error("API Call Error:", error);
        throw error;
      }
    }

    function processRequest() {
      const fileInput = document.getElementById('csvFile');
      const listName = document.getElementById('listName').value;
      const output = document.getElementById('output');
      const loading = document.getElementById('loading');
      const submitBtn = document.getElementById('submitBtn');
      const emptyState = document.getElementById('empty-state');
      const resultContainer = document.getElementById('result-container');
      const chatMessages = document.getElementById('chatMessages');

      if (!fileInput.files.length) {
        showError('CSVファイルを選択してください。');
        return;
      }
      if (!listName) {
        showError('架電先のリスト名を入力してください。');
        return;
      }

      const fileName = fileInput.files[0].name;
      let clientName = fileName.split('御中')[0].trim();
      if (clientName === fileName) {
        clientName = fileName.replace('.csv', '');
      }

      const reader = new FileReader();
      reader.onload = async function(e) {
        currentCsvData = e.target.result;
        
        // UIの初期化（ロード状態）
        emptyState.style.display = 'none';
        resultContainer.style.display = 'none';
        output.innerHTML = '';
        loading.style.display = 'block';
        submitBtn.disabled = true;
        submitBtn.textContent = '作成中...';

        // チャット履歴のリセット
        chatMessages.innerHTML = `
          <div class="message bot">
            <div class="message-bubble">
              台本とウェブの最新情報の分析が完了しました！内容について分からないことや、特定の断り文句に対する切り返しの相談などがあれば、何でも聞いてください。
            </div>
          </div>
        `;

        // 提示されたプロンプトの構成
        const systemPrompt = `
あなたは優秀なテレアポのディレクター（SV）「台本ナビ」です。
提供された「会社名・商材情報と台本が記載されたCSVファイル」と、架電先の「リスト名（ターゲット属性）」を分析し、主婦の初心者の架電者が商材の本質を即座に理解して自信を持って案内できる「噛み砕いた解説＆切り返し時のエッセンス」を出力構成通りに一発で作成してください。

実行ステップ
1. CSVからの情報抽出: 提供されたCSVファイルから「会社名」「事業内容」「商材情報・強み」、および「トークスクリプト（プロット・切り返し例など）」の主要な情報を抽出・把握してください。
2. 企業情報のウェブ検索補完: 抽出した「会社名」や「商材名」をもとにウェブ検索を行い、公式情報や信頼できるソースから最新の事業内容や商材の特徴、強みなどの周辺情報を収集し、CSVの情報を補完してください。
※URLへ直接アクセスしてエラーになるのを防ぐため、必ず「検索キーワード」を用いて情報を集めてください。
3. 資料の生成: 抽出・補完した情報と、ユーザーから提供された「リスト名」を掛け合わせ、架電者向けに最適化された内容で以下の【出力構成】に従って出力してください。

■ 追加の厳守ルール
・HP情報とCSV（台本）情報の扱いに関する徹底分離：ウェブ検索で得た情報は「商材の本質を深く理解するための解説」としてのみ参考にすること。
・「切返し時に使える訴求ポイント」には、ウェブ検索にしか載っていない独自の強みやキーワードを勝手に盛り込むのは【完全NG】。CSV内にある情報のみをベースに直感的で短いフレーズに最適化すること。
・前置きの挨拶や文章は一切不要。「1. 💡 何を勧める？メリットは？」からすぐに出力を開始すること。

出力構成

<h1>🏢 クライアント：${clientName}</h1>

### 1. 💡 何を勧める？メリットは？
【文字数目安：250文字以内】
短くシンプルに解説。架電者が商材の仕組みや顧客が抱えているであろう一般的な課題点と解決策及びメリットを直感的に理解できるよう、絵文字と記号を使ったシンプルな関係図、またはMarkdownのテーブル機能で商材の構造を視覚的に表現。

### 2.⏰ なぜ「今」？
【文字数目安：250文字以内】
損失回避バイアスを用い「後回しにすると損をするかも」「今聞いておかないとマズイかも」と緊急性を感じさせる理由を、端的に、1〜2文で提示してください。

### 3．🛡️切返し時に使える訴求ポイント
「興味ない」「間に合っている」「他社を使っている」などの拒否への対応を3パターン作成。
・【訴求ポイント】：同調しながらも損失回避バイアスを用い、現状維持のリスクをそれとなく提示しそれに対するメリットを提示。100字程度。
`;
        const userPrompt = "【リスト名（ターゲット属性）】\n" + listName + "\n\n【CSVデータ】\n" + currentCsvData;

        try {
          // バックエンド（GAS）を介さず、直接APIを呼び出す
          generatedScriptContent = await callGeminiAPI(systemPrompt, userPrompt);
          renderResult(generatedScriptContent);
        } catch (error) {
          loading.style.display = 'none';
          submitBtn.disabled = false;
          submitBtn.textContent = '解説シートを作成する';
          output.innerHTML = '<p style="color:red; font-weight:bold;">API呼び出しエラー: ' + error.message + '</p>';
          resultContainer.style.display = 'block';
        }
      };

      reader.readAsText(fileInput.files[0]);
    }
    
    function renderResult(resultText) {
      const output = document.getElementById('output');
      const loading = document.getElementById('loading');
      const submitBtn = document.getElementById('submitBtn');
      const resultContainer = document.getElementById('result-container');

      loading.style.display = 'none';
      submitBtn.disabled = false;
      submitBtn.textContent = '解説シートを作成する';
      
      // Markdownパースと独自タグの置換
      let htmlContent = marked.parse(resultText);
      htmlContent = htmlContent.replace(/\[info\]/g, '<span class="tag-info">[info]</span>');
      htmlContent = htmlContent.replace(/\[title\]/g, '<span class="tag-title">[title]</span>');
      htmlContent = htmlContent.replace(/\[red\](.*?)\[\/red\]/g, '<span class="tag-red">$1</span>'); 
      
      output.innerHTML = htmlContent;
      resultContainer.style.display = 'block';
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendQuestion();
      }
    }

    function appendMessage(sender, text) {
      const messagesContainer = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message ' + sender;
      
      const bubbleDiv = document.createElement('div');
      bubbleDiv.className = 'message-bubble';
      
      if (sender === 'bot') {
         // Botからの返答はMarkdownとしてパース
         bubbleDiv.innerHTML = marked.parse(text);
      } else {
         bubbleDiv.textContent = text;
      }
      
      messageDiv.appendChild(bubbleDiv);
      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    async function sendQuestion() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      const sendBtn = document.getElementById('sendBtn');
      
      if (!text) return;
      if (!generatedScriptContent) {
         showError('先に解説シートを作成してください。');
         return;
      }

      appendMessage('user', text);
      input.value = '';
      sendBtn.disabled = true;
      sendBtn.textContent = '...';

      // Q&A用のシステムプロンプト
      const qaSystemPrompt = `
あなたは優秀なテレアポの台本を作ったクライアントの営業担当です。
以下の【台本・企業データ】および【作成済み解説シート】の文脈を踏まえ、架電者をトレーニングするにあたってディレクターからの質問に対して、具体的で実践的な回答してください。
`;
      const qaUserPrompt = `
【台本・企業データ】
${currentCsvData}

【作成済み解説シート】
${generatedScriptContent}

【架電者からの質問】
${text}
`;

      try {
        // Q&Aも直接APIを呼び出す
        const responseText = await callGeminiAPI(qaSystemPrompt, qaUserPrompt);
        appendMessage('bot', responseText);
      } catch (error) {
        appendMessage('bot', 'エラーが発生しました: ' + error.message);
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = '送信';
      }
    }
  </script>
</body>
</html>
